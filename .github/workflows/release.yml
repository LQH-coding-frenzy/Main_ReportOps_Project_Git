name: Repository Source Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    name: Build and Publish Source Bundles
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 20

      # ── Build Frontend ──
      - name: Install & Build frontend
        working-directory: frontend
        run: |
          npm ci --legacy-peer-deps
          npm run build

      # ── Build Backend ──
      - name: Install & Build backend
        working-directory: backend
        run: |
          npm ci --legacy-peer-deps
          npx prisma generate
          npm run build

      # ── Package artifacts ──
      - name: Package backend
        run: |
          mkdir -p release-artifacts
          cd backend
          tar -czf ../release-artifacts/backend-${{ github.ref_name }}.tar.gz \
            dist/ package.json package-lock.json prisma/
          cd ..

      - name: Package frontend source
        run: |
          tar -czf release-artifacts/frontend-${{ github.ref_name }}.tar.gz \
            frontend/src/ frontend/package.json frontend/package-lock.json frontend/tsconfig.json \
            frontend/next.config.js frontend/eslint.config.cjs frontend/next-env.d.ts

      - name: Package infrastructure and metadata
        run: |
          tar -czf release-artifacts/infra-${{ github.ref_name }}.tar.gz \
            infra/ .github/workflows/ project.answers.yaml README.md WRITING_GUIDE.md AGENTS.md

      # ── Create GitHub Release ──
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref_name, 'rc') || contains(github.ref_name, 'beta') }}
          files: |
            release-artifacts/*
          body: |
            ## ReportOps repository source bundles for ${{ github.ref_name }}

            ### 📦 Artifacts
            - `backend-${{ github.ref_name }}.tar.gz` — Compiled backend bundle (`dist` + Prisma assets)
            - `frontend-${{ github.ref_name }}.tar.gz` — Frontend source bundle for Vercel-hosted UI
            - `infra-${{ github.ref_name }}.tar.gz` — Infrastructure, workflow, and metadata bundle

            ### Scope
            This workflow archives repository deployment assets for a tagged source release.
            Final report releases created inside the ReportOps web app still use the in-app freeze flow and backend GitHub release service.

            ### 🚀 Deploy
            ```bash
            # On GCP VM (backend bundle example):
            cd /opt/reportops
            tar -xzf backend-${{ github.ref_name }}.tar.gz -C backend/
            cd backend && npm ci --production && pm2 restart reportops-api
            ```

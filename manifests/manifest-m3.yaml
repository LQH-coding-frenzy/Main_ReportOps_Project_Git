pack_id: "m3-admin-access"
owner_section: "M3"
title: "Bao ve truy cap quan tri"
script: "scripts/m3_admin_access.sh"
benchmark:
  name: "CIS AlmaLinux OS 9 Benchmark"
  version: "2.0.0"
  profile: "Level 1 - Server"
controls:
  - id: "5.1.1"
    title: "Ensure permissions on /etc/ssh/sshd_config are configured"
    section: "5.1"
    parser: "cis_stdout"
  - id: "5.1.15"
    title: "Ensure sshd LogLevel is configured"
    section: "5.1"
    parser: "cis_stdout"
  - id: "5.1.19"
    title: "Ensure sshd PermitEmptyPasswords is disabled"
    section: "5.1"
    parser: "cis_stdout"
  - id: "5.1.20"
    title: "Ensure sshd PermitRootLogin is disabled"
    section: "5.1"
    parser: "cis_stdout"
  - id: "5.1.22"
    title: "Ensure sshd UsePAM is enabled"
    section: "5.1"
    parser: "cis_stdout"
  - id: "5.2.2"
    title: "Ensure sudo commands use pty"
    section: "5.2"
    parser: "cis_stdout"
  - id: "5.2.6"
    title: "Ensure sudo authentication timeout is configured correctly"
    section: "5.2"
    parser: "cis_stdout"

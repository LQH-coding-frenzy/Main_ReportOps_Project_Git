# ═══════════════════════════════════════════════════
# ReportOps — Nginx Reverse Proxy Configuration
# Handles routing for api. and docs. subdomains
# Includes SSL/TLS via Let's Encrypt
# ═══════════════════════════════════════════════════

events {
    worker_connections 512;
}

http {
    # ── Shared Settings ──
    sendfile on;
    keepalive_timeout 65;
    client_max_body_size 100M;  # Allow large document uploads

    # ── Logging ──
    access_log /var/log/nginx/access.log;
    error_log  /var/log/nginx/error.log;

    # ── Rate limiting ──
    limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;
    limit_req_zone $binary_remote_addr zone=login:10m rate=60r/m;

    # ── Upstream: Express Backend ──
    upstream backend {
        server host.docker.internal:4000;
    }

    # ── Upstream: ONLYOFFICE Document Server ──
    upstream onlyoffice {
        server onlyoffice:80;
    }

    # ════════════════════════════════════════════════
    # HTTP → HTTPS redirect + ACME challenge
    # ════════════════════════════════════════════════
    server {
        listen 80;
        server_name api.automatedprogram.app docs.automatedprogram.app;

        # Let's Encrypt ACME challenge
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        # Redirect everything else to HTTPS
        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ════════════════════════════════════════════════
    # API Server (api.automatedprogram.app)
    # ════════════════════════════════════════════════
    server {
        listen 443 ssl;
        server_name api.automatedprogram.app;

        # SSL certificates (managed by Certbot)
        ssl_certificate /etc/letsencrypt/live/api.automatedprogram.app/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/api.automatedprogram.app/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;

        # Security headers
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

        # API rate limiting
        location /api/auth/ {
            limit_req zone=login burst=30 nodelay;
            proxy_pass http://backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location / {
            limit_req zone=api burst=50 nodelay;
            proxy_pass http://backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # CORS headers
            add_header Access-Control-Allow-Origin "https://automatedprogram.app" always;
            add_header Access-Control-Allow-Credentials "true" always;
            add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Content-Type, Authorization, Cookie" always;

            if ($request_method = 'OPTIONS') {
                return 204;
            }
        }
    }

    # ════════════════════════════════════════════════
    # ONLYOFFICE (docs.automatedprogram.app)
    # ════════════════════════════════════════════════
    server {
        listen 443 ssl;
        server_name docs.automatedprogram.app;

        # SSL certificates (managed by Certbot)
        # Using the unified certificate requested for both api. and docs. subdomains
        ssl_certificate /etc/letsencrypt/live/api.automatedprogram.app/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/api.automatedprogram.app/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;

        # Security headers
        add_header X-Content-Type-Options "nosniff" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

        location / {
            proxy_pass http://onlyoffice;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";

            # WebSocket support (required for ONLYOFFICE real-time)
            proxy_http_version 1.1;

            # Increased timeouts for large document operations
            proxy_connect_timeout 300;
            proxy_send_timeout 300;
            proxy_read_timeout 300;
        }
    }

    # ── Default server (catch-all) ──
    server {
        listen 80 default_server;
        listen 443 ssl default_server;
        server_name _;

        # Self-signed fallback for default (won't be used in practice)
        ssl_certificate /etc/letsencrypt/live/api.automatedprogram.app/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/api.automatedprogram.app/privkey.pem;

        return 444;  # Close connection without response
    }
}

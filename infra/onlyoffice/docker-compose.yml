# ═══════════════════════════════════════════════════
# ONLYOFFICE Document Server + ReportOps Backend
# Docker Compose for GCP VM deployment
# ═══════════════════════════════════════════════════
#
# Usage:
#   docker compose up -d
#
# Prerequisites:
#   - Docker & Docker Compose installed on GCP VM
#   - Run setup-vm.sh first to configure the host
#   - SSL certificates in ./certs/ (auto-generated by certbot)

services:
  # ── ONLYOFFICE Document Server ──
  onlyoffice:
    image: onlyoffice/documentserver:latest
    container_name: reportops-onlyoffice
    restart: always
    ports:
      - "8080:80"
    environment:
      - JWT_ENABLED=true
      - JWT_SECRET=${ONLYOFFICE_JWT_SECRET:-reportops-onlyoffice-secret}
      - JWT_HEADER=Authorization
      - JWT_IN_BODY=true
    volumes:
      - oo_data:/var/www/onlyoffice/Data
      - oo_logs:/var/log/onlyoffice
      - oo_lib:/var/lib/onlyoffice
      - oo_db:/var/lib/postgresql
    deploy:
      resources:
        limits:
          memory: 768M
        reservations:
          memory: 512M
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/healthcheck"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s

  # ── Nginx Reverse Proxy with SSL ──
  nginx:
    image: nginx:alpine
    container_name: reportops-nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - /var/www/certbot:/var/www/certbot:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - onlyoffice

  # ── Certbot for SSL auto-renewal ──
  certbot:
    image: certbot/certbot:latest
    container_name: reportops-certbot
    volumes:
      - /var/www/certbot:/var/www/certbot
      - /etc/letsencrypt:/etc/letsencrypt
    # Renew certificates automatically every 12 hours
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew --quiet; sleep 12h & wait $${!}; done;'"

volumes:
  oo_data:
  oo_logs:
  oo_lib:
  oo_db:
